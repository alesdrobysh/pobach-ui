<!DOCTYPE html>
<html lang="be">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Побач - Няма злучэння</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fdfcfb;
      color: #1a1625;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 1rem;
      text-align: center;
    }
    .container { max-width: 400px; }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }
h1 {
       font-size: 1.5rem;
       margin-bottom: 0.75rem;
       color: #f58d3d;
     }
    p {
      color: #52495a;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
button {
       background: #f58d3d;
       color: #fff;
       border: none;
       padding: 0.75rem 2rem;
       border-radius: 0.5rem;
       font-size: 1rem;
       cursor: pointer;
     }
     button:hover { background: #e07b2d; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Няма злучэння</h1>
    <p>Каб гуляць у Побач, патрэбна інтэрнэт-злучэнне. Праверце сваё злучэнне і паспрабуйце зноў.</p>
    <button onclick="location.reload()">Паспрабаваць зноў</button>
  </div>
</body>
</html>
